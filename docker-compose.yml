services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: healthcare_db
      POSTGRES_USER: healthcare_user
      POSTGRES_PASSWORD: healthcare_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare_user -d healthcare_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: gunicorn backend.app:app -b 0.0.0.0:8000 --workers=1
    volumes:
      - ./backend:/project/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://healthcare_user:healthcare_pass@db:5432/healthcare_db
      - SECRET_KEY=change_me_to_secure_in_production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_API_URL=${GEMINI_API_URL}
      - FLASK_ENV=production
      - PYTHONPATH=/project
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: